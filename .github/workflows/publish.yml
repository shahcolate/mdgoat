name: Publish to PyPI

# Publishes using PyPI Trusted Publishing (OIDC) — no API tokens stored.
# Configure the "pypi" environment as a trusted publisher for this repo at
# https://pypi.org/manage/account/publishing/ before first use.
#
# Fires on a published GitHub Release (the normal path, which also creates the
# tag), or manually via the Actions tab / `workflow_dispatch` — handy for
# re-running a failed publish. Trusted Publishing matches on the workflow file
# and the "pypi" environment, not the trigger, so both paths work.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
